<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ETA Cloud</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .container { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h1 { margin: 0 0 20px 0; color: #333; }
        p { color: #666; margin: 10px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>ETA Cloud</h1>
        <p>Caricamento...</p>
        <div class="spinner"></div>
    </div>
    <script>
        fetch('https://raw.githubusercontent.com/Gabry2317/cloud/main/cloud.json')
            .then(r => r.json())
            .then(data => {
                console.log('URL trovato:', data.url);
                setTimeout(() => window.location.href = data.url, 500);
            })
            .catch(e => {
                document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;"><div style="text-align:center;background:white;padding:40px;border-radius:10px;"><h1>⚠️ Errore</h1><p>Impossibile caricare l\'URL del cloud</p><p style="color:#666;font-size:12px;">Errore: ' + e + '</p></div></div>';
            });
    </script>
</body>
</html>
